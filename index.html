<!DOCTYPE html>
<html lang = "eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale = 1.0, maximum-scale = 1.0, user-scalable =yes">
        <title>Stardew Valley Calendar</title>
        <link rel="stylesheet" href="stardew.css">
    </head>
    <body>
        <div id="whole-screen">
            <div class ="change-season">
                <button id="spring-button" class="buttons">Spring</button>
                <button id="summer-button" class="buttons">Summer</button>
                <button id="fall-button" class="buttons">Fall</button>
                <button id="winter-button" class="buttons">Winter</button>
            </div>
        </div>
        <div id="spring" class="season">
            <h1>Spring</h1>
            <div class="calendar">
                <div class="week">
                    <p>M</p>
                    <p>T</p>
                    <p>W</p>
                    <p>Th</p>
                    <p>F</p>
                    <p>Sa</p>
                    <p>Su</p>
                </div>
                <div id="spring-month" class="month"></div>
            </div>
        </div>
        <div id="summer" class="season">
            <h1>Summer</h1>
            <div id="summer-calendar" class="calendar">
                <div class="week">
                    <p>M</p>
                    <p>T</p>
                    <p>W</p>
                    <p>Th</p>
                    <p>F</p>
                    <p>Sa</p>
                    <p>Su</p>
                </div>
                <div id="summer-month" class="month"></div>
                </div>
        </div>
        <div id="fall" class="season">
            <h1>Fall</h1>
            <div id="fall-calendar" class="calendar">
                <div class="week">
                    <p>M</p>
                    <p>T</p>
                    <p>W</p>
                    <p>Th</p>
                    <p>F</p>
                    <p>Sa</p>
                    <p>Su</p>
                </div>
                <div id="fall-month" class="month"></div>
            </div>
        </div>
        <div id="winter" class="season">
            <h1>Winter</h1>
            <div id="winter-calendar" class="calendar">
                <div class="week">
                    <p>M</p>
                    <p>T</p>
                    <p>W</p>
                    <p>Th</p>
                    <p>F</p>
                    <p>Sa</p>
                    <p>Su</p>
                </div>
                <div id="winter-month" class="month"></div>
            </div>
        </div>
        <script src="stardew.js"></script> 
    </body>
</html>
